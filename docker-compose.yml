services:
  uto-db:
    image: postgres:17
    container_name: uto-db
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-mock_uto}
      POSTGRES_USER: ${DB_USER:-kmg_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kmg_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/init_schemas.sql:/docker-entrypoint-initdb.d/01_schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kmg_user} -d ${DB_NAME:-mock_uto}"]
      interval: 3s
      timeout: 3s
      retries: 10

  uto-api:
    build: .
    container_name: uto-api
    restart: unless-stopped
    command: api
    ports:
      - "${API_PORT:-8003}:${API_PORT:-8003}"
    env_file: .env
    environment:
      DB_HOST: uto-db
      DB_PORT: 5432
    depends_on:
      uto-db:
        condition: service_healthy

  uto-ui:
    build: .
    container_name: uto-ui
    restart: unless-stopped
    command: streamlit
    ports:
      - "8503:8503"
    env_file: .env
    environment:
      API_URL: http://uto-api:${API_PORT:-8003}
    depends_on:
      - uto-api

volumes:
  pgdata:
